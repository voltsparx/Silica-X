# Silinosic-X Docker Compose
# Usage: docker compose -f docker/docker-compose.yml up silinosic-x

services:

  silinosic-x:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: silinosic-x:latest
    container_name: silinosic-x
    stdin_open: true
    tty: true
    volumes:
      - ../output:/app/output
    environment:
      - SILINOSIC_X_DOCKER=1
    entrypoint: ["silinosic-x"]
    command: ["prompt"]

  silinosic-x-tor:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: silinosic-x:latest
    container_name: silinosic-x-tor
    stdin_open: true
    tty: true
    volumes:
      - ../output:/app/output
    environment:
      - SILINOSIC_X_DOCKER=1
      - SILINOSIC_X_TOR=1
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        service tor start && sleep 2 && silinosic-x prompt --tor

  silinosic-x-full:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: silinosic-x:latest
    container_name: silinosic-x-full
    stdin_open: true
    tty: true
    volumes:
      - ../output:/app/output
    environment:
      - SILINOSIC_X_DOCKER=1
      - SILINOSIC_X_TOR=1
    ports:
      - "8000:8000"
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        service tor start && sleep 2 && silinosic-x prompt --tor
